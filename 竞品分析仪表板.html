function parseNum(v) {
  if (v === '/' || v === '' || v === undefined || v === null) return NaN;
  const s = String(v).replace(/[^\d.-]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n;
}

function formatNum(v) {
  if (v === '/' || v === '' || v === undefined || v === null) return '/';
  const n = parseNum(v);
  return isNaN(n) ? String(v) : n.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
}

  if (cert.includes('保健')) return '<span class="tag tag-health">保健食品</span>';
  if (cert.includes('普通')) return '<span class="tag tag-food">普通食品</span>';
  if (cert.includes('跨境')) return '<span class="tag tag-overseas">跨境</span>';
  if (cert.includes('固体饮料')) return '<span class="tag tag-food">固体饮料</span>';
  return '<span class="tag tag-food">' + cert + '</span>';
}

// ========== CHARTS ==========
let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function createBarChart(canvasId, labels, values, color, label, yLabel) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const c = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: label,
        data: values,
        backgroundColor: values.map((v, i) => {
          const alpha = 0.6 + (i / values.length) * 0.3;
          return color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
        }),
        borderColor: color,
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: yLabel || '', font: { size: 12 } }, grid: { color: '#f1f5f9' } },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
  return c;
}

function createHorizontalBar(canvasId, labels, values, color, label) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const c = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: label,
        data: values,
        backgroundColor: color,
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, grid: { color: '#f1f5f9' }, title: { display: true, text: label, font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
  return c;
}

function createRadarChart(canvasId, labels, datasets) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const c = new Chart(ctx, {
    type: 'radar',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: { r: { beginAtZero: true, ticks: { font: { size: 9 }, backdropColor: 'transparent' }, pointLabels: { font: { size: 10 } } } },
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 16 } } }
    }
  });
  return c;
}

  const content = document.getElementById('content');

  if (tab === 'overview') {
    content.innerHTML = renderOverview();
    setTimeout(() => {
      const scatterCtx = document.getElementById('overviewScatter');
      if (scatterCtx) {
        // Scatter: purity vs pricePerGProtein
        const data = allProteinProducts.filter(p => p.purity > 0 && p.pricePerGProtein > 0);

            responsive: true, maintainAspectRatio: false,

              tooltip: { callbacks: { label: ctx => `${data[ctx.dataIndex].brand}: 纯度${ctx.raw.x}%, ¥${ctx.raw.y.toFixed(2)}/g蛋白` } },

              x: { title: { display: true, text: '蛋白纯度 (%)', font: { size: 12 } }, grid: { color: '#f1f5f9' } },

// ========== PROTEIN TABLE ==========
let proteinSortField = 'purity';
let proteinSortAsc = false;

function sortProteinTable(field) {
  if (proteinSortField === field) proteinSortAsc = !proteinSortAsc;
  else { proteinSortField = field; proteinSortAsc = false; }
  const filtered = getFilteredProducts();
  filtered.sort((a, b) => {
    let va = a[field], vb = b[field];
    if (typeof va === 'string') va = parseFloat(va);
    if (typeof vb === 'string') vb = parseFloat(vb);
    if (isNaN(va)) va = 0; if (isNaN(vb)) vb = 0;
    return proteinSortAsc ? va - vb : vb - va;
  });
  renderProteinTable(filtered);
}

function getFilteredProducts() {
  const search = (document.getElementById('proteinSearch')?.value || '').toLowerCase();
  const cert = document.getElementById('proteinCertFilter')?.value || 'all';
  return allProteinProducts.filter(p => {
    const matchSearch = !search || p.brand.toLowerCase().includes(search) || p.product.toLowerCase().includes(search) || p.target.toLowerCase().includes(search);
    const matchCert = cert === 'all' || p.cert === cert;
    return matchSearch && matchCert;
  }).sort((a, b) => b.purity - a.purity);
}

function filterProteinTable() {
  renderProteinTable(getFilteredProducts());
}

function renderProteinTable(products) {
  const tbody = document.getElementById('proteinTableBody');
  if (!tbody) return;
  document.getElementById('tableCount').textContent = products.length + ' 款产品';
  tbody.innerHTML = products.map(p => `
    <tr class="${p.isOurs ? 'highlight' : ''}">
      <td><strong>${p.isOurs ? '⭐ ' : ''}${p.brand}</strong></td>
      <td>${getCertTag(p.cert)}</td>
      <td>${p.product}</td>
      <td>${p.target}</td>
      <td>${p.spec}</td>
      <td>¥${p.price}</td>
      <td><strong>${p.purity}%</strong></td>
      <td>¥${p.pricePerGProtein.toFixed(2)}</td>
    </tr>
  `).join('');
}
